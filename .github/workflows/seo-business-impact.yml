name: "💶 Impacto negocio SEO"

on:
  schedule:
    - cron: '25 10 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: seo-business-impact
  cancel-in-progress: true

jobs:
  impact:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6

      - name: "💶 Estimar impacto"
        run: |
          set -euo pipefail
          python3 .github/scripts/seo_business_impact.py --rpm-eur 5.0 --json /tmp/seo-business-impact.json --report /tmp/seo-business-impact.md
          cat /tmp/seo-business-impact.md

      - name: "📝 Sincronizar issue canónico"
        uses: actions/github-script@v8
        env:
          REPORT_PATH: /tmp/seo-business-impact.md
          JSON_PATH: /tmp/seo-business-impact.json
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '💶 Impacto negocio SEO';
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              fs.readFileSync(process.env.REPORT_PATH, 'utf8'),
              '',
              '```json',
              fs.readFileSync(process.env.JSON_PATH, 'utf8'),
              '```',
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100,
            });

            const matching = issues
              .filter((issue) => issue.title.startsWith(titlePrefix))
              .sort((a, b) => a.number - b.number);
            const title = `${titlePrefix} — ${today}`;

            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body,
              });
              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed',
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report'],
              });
            }
