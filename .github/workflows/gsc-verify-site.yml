name: "🔐 Verificar sitio en Search Console (HTML file)"

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Dominio a verificar (sin https://)'
        required: true
        default: 'meditacion-chakras.es'
      site_key:
        description: 'Clave del sitio en el cluster'
        required: true
        default: 'meditacion-chakras'
      firebase_project:
        description: 'ID del proyecto Firebase'
        required: true
        default: 'meditacion-chakras-es'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: "🔐 Obtener token OAuth (siteverification scope)"
        id: oauth
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 \
            --connect-timeout 10 --max-time 30 \
            https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token")

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "No se pudo obtener access token:" >&2
            echo "$token_json" >&2
            exit 1
          fi

          # Verificar que el token tiene scope siteverification o webmasters
          scopes=$(curl -sS "https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=$access_token" \
            | jq -r '.scope // ""')
          if ! echo "$scopes" | grep -qE "siteverification|webmasters"; then
            echo "❌ El token OAuth no tiene scope siteverification ni webmasters." >&2
            echo "Scopes actuales: $scopes" >&2
            exit 1
          fi

          {
            echo "token<<EOF"
            echo "$access_token"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "🏷️ Obtener token de verificación HTML"
        id: verif_token
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.token }}
          SITE_URL: "https://${{ inputs.domain }}/"
        run: |
          set -euo pipefail

          response=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 \
            --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $OAUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"verificationMethod\": \"FILE\", \"site\": {\"type\": \"SITE\", \"identifier\": \"$SITE_URL\"}}" \
            "https://www.googleapis.com/siteVerification/v1/token")

          echo "Site Verification token response: $response"

          token=$(echo "$response" | jq -r '.token // empty')
          if [ -z "$token" ]; then
            echo "❌ No se pudo obtener el token de verificación." >&2
            exit 1
          fi

          echo "verify_token=$token" >> "$GITHUB_OUTPUT"

      - name: "📄 Crear archivo de verificación en el repo"
        env:
          VERIFY_TOKEN: ${{ steps.verif_token.outputs.verify_token }}
          SITE_KEY: ${{ inputs.site_key }}
        run: |
          set -euo pipefail
          # El archivo debe llamarse exactamente como el token y su contenido es el token
          dest="sites/${SITE_KEY}/public/${VERIFY_TOKEN}"
          echo "$VERIFY_TOKEN" > "$dest"
          echo "Creado: $dest con contenido: $VERIFY_TOKEN"

      - name: "🚀 Desplegar archivo de verificación en Firebase Hosting"
        env:
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SA_MEDITACION_CHAKRAS }}
          SITE_KEY: ${{ inputs.site_key }}
        run: |
          set -euo pipefail
          creds_file="$RUNNER_TEMP/firebase-verify.json"
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$creds_file"
          GOOGLE_APPLICATION_CREDENTIALS="$creds_file" \
            npx firebase-tools@15.15.0 deploy \
              --only hosting \
              --project "$FIREBASE_PROJECT_ID" \
              --non-interactive \
              2>&1
          rm -f "$creds_file"

      - name: "⏳ Esperar propagación (15s)"
        run: sleep 15

      - name: "✅ Completar verificación en Google"
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.token }}
          SITE_URL: "https://${{ inputs.domain }}/"
        run: |
          set -euo pipefail

          response=$(curl -sS --fail-with-body --retry 2 --retry-delay 3 \
            --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $OAUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"site\": {\"type\": \"SITE\", \"identifier\": \"$SITE_URL\"}}" \
            "https://www.googleapis.com/siteVerification/v1/webResource?verificationMethod=FILE")

          echo "Verificación response: $response"

          owner=$(echo "$response" | jq -r '.owners[0] // empty')
          if [ -z "$owner" ]; then
            echo "❌ La verificación no devolvió owners. Respuesta:" >&2
            echo "$response" >&2
            exit 1
          fi
          echo "✅ Sitio verificado. Owner: $owner"

      - name: "💾 Commit del archivo de verificación (permanente)"
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "sites/${{ inputs.site_key }}/public/${{ steps.verif_token.outputs.verify_token }}"
          git diff --cached --quiet && echo "No hay cambios nuevos" && exit 0
          git commit -m "chore: añadir archivo de verificación GSC para ${{ inputs.domain }}

El archivo debe permanecer accesible para mantener la propiedad verificada
en Google Search Console (método: HTML file, propiedad: URL prefix)."
          git push origin HEAD
