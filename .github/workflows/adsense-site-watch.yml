name: "💰 Vigilancia de sitios de AdSense"

on:
  schedule:
    - cron: '25 7 * * 1,4'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔐 Obtener token OAuth"
        id: oauth
        env:
          GOOGLE_OAUTH_ADC_JSON: ${{ secrets.GOOGLE_OAUTH_ADC_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_OAUTH_ADC_JSON:-}" ]; then
            pip -q install google-auth
            adc_file="$RUNNER_TEMP/google-oauth-adc.json"
            printf '%s' "$GOOGLE_OAUTH_ADC_JSON" > "$adc_file"
            chmod 600 "$adc_file"
            access_token=$(GOOGLE_APPLICATION_CREDENTIALS="$adc_file" python3 -c "import google.auth,google.auth.transport.requests;creds,_=google.auth.default(scopes=['https://www.googleapis.com/auth/adsense.readonly']);creds.refresh(google.auth.transport.requests.Request());print(creds.token or '')" 2>/dev/null || true)
            rm -f "$adc_file"
            if [ -n "$access_token" ]; then
              echo "missing=false" >> "$GITHUB_OUTPUT"
              {
                echo "token<<EOF"
                echo "$access_token"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ -z "${GOOGLE_OAUTH_CLIENT_ID:-}" ] || [ -z "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] || [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "detail=Faltan GOOGLE_OAUTH_ADC_JSON o GOOGLE_OAUTH_* legacy" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token" || true)

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "$token_json"
            detail=$(echo "$token_json" | jq -r '.error_description // .error // "No se pudo intercambiar GOOGLE_OAUTH_REFRESH_TOKEN por access token"' 2>/dev/null || echo "No se pudo intercambiar GOOGLE_OAUTH_REFRESH_TOKEN por access token")
            {
              echo "detail<<EOF"
              echo "$detail"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "missing=false" >> "$GITHUB_OUTPUT"
          {
            echo "token<<EOF"
            echo "$access_token"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "💰 Inspeccionar sitios del cluster en AdSense"
        if: steps.oauth.outputs.missing == 'false'
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.token }}
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
          ADSENSE_ACCOUNT: "accounts/pub-9368517395014039"
          EXPECTED_DOMAINS_JSON: >-
            ["carta-astral-gratis.es","compatibilidad-signos.es","tarot-del-dia.es","calcular-numerologia.es","horoscopo-de-hoy.es","meditacion-chakras.es"]
        run: |
          set -euo pipefail
          python3 .github/scripts/adsense_site_watch.py > /tmp/adsense-site-watch.md
          cat /tmp/adsense-site-watch.md

      - name: "📝 Sincronizar issue de AdSense"
        uses: actions/github-script@v8
        env:
          REPORT_PATH: /tmp/adsense-site-watch.md
          MISSING_OAUTH: ${{ steps.oauth.outputs.missing }}
          OAUTH_DETAIL: ${{ steps.oauth.outputs.detail }}
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '💰 Vigilancia de sitios de AdSense';
            const legacyTitlePrefixes = [
              titlePrefix,
              '💰 Vigilancia de sitios AdSense'
            ];
            const today = new Date().toISOString().slice(0, 10);
            const body = process.env.MISSING_OAUTH === 'true'
              ? [
                  'No se pudo ejecutar la vigilancia de AdSense porque el OAuth de usuario no es utilizable.',
                  '',
                  `Detalle: ${process.env.OAUTH_DETAIL || 'Faltan GOOGLE_OAUTH_*'}.`,
                  '',
                  'Para consultar la API de AdSense, el refresh token debe incluir `https://www.googleapis.com/auth/adsense.readonly` o `https://www.googleapis.com/auth/adsense`.'
                ].join('\n')
              : fs.readFileSync(process.env.REPORT_PATH, 'utf8');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100
            });

            const matching = issues
              .filter(issue => legacyTitlePrefixes.some(prefix => issue.title.startsWith(prefix)))
              .sort((a, b) => a.number - b.number);
            const title = `${titlePrefix} — ${today}`;

            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body
              });

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Sustituido por #${primary.number}. Mantenemos un único issue canónico de vigilancia de AdSense.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed'
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report']
              });
            }
