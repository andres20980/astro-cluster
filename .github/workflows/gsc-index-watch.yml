name: "🔎 Vigilancia de indexación de GSC"

on:
  schedule:
    - cron: '15 7 * * 1,3,5'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔑 Autenticación de Google"
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: "🔐 Obtener token OAuth"
        id: oauth
        env:
          GOOGLE_OAUTH_ADC_JSON: ${{ secrets.GOOGLE_OAUTH_ADC_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_OAUTH_ADC_JSON:-}" ]; then
            pip -q install google-auth
            adc_file="$RUNNER_TEMP/google-oauth-adc.json"
            printf '%s' "$GOOGLE_OAUTH_ADC_JSON" > "$adc_file"
            chmod 600 "$adc_file"
            access_token=$(GOOGLE_APPLICATION_CREDENTIALS="$adc_file" python3 -c "import google.auth,google.auth.transport.requests;creds,_=google.auth.default(scopes=['https://www.googleapis.com/auth/webmasters']);creds.refresh(google.auth.transport.requests.Request());print(creds.token or '')" 2>/dev/null || true)
            rm -f "$adc_file"
            if [ -n "$access_token" ]; then
              echo "missing=false" >> "$GITHUB_OUTPUT"
              {
                echo "token<<EOF"
                echo "$access_token"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ -z "${GOOGLE_OAUTH_CLIENT_ID:-}" ] || [ -z "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] || [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "error_detail=Faltan GOOGLE_OAUTH_ADC_JSON o GOOGLE_OAUTH_* legacy" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token" || true)

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "$token_json"
            error_detail=$(echo "$token_json" | jq -r '.error_description // .error // "No se pudo intercambiar GOOGLE_OAUTH_REFRESH_TOKEN por access token"' 2>/dev/null || echo "No se pudo intercambiar GOOGLE_OAUTH_REFRESH_TOKEN por access token")
            {
              echo "error_detail<<EOF"
              echo "$error_detail"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "missing=false" >> "$GITHUB_OUTPUT"
          {
            echo "token<<EOF"
            echo "$access_token"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "🔎 Inspeccionar portadas del cluster"
        id: inspect
        env:
          OAUTH_TOKEN: ${{ steps.oauth.outputs.token }}
          OAUTH_TOKEN_MISSING: ${{ steps.oauth.outputs.missing }}
          OAUTH_ERROR_DETAIL: ${{ steps.oauth.outputs.error_detail }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
          GSC_ALLOW_SERVICE_ACCOUNT_URL_INSPECTION: ${{ vars.GSC_ALLOW_SERVICE_ACCOUNT_URL_INSPECTION || 'false' }}
          GSC_INDEX_SKIP_DOMAINS: ${{ vars.GSC_INDEX_SKIP_DOMAINS || '' }}
          GSC_SITES_JSON: >-
            [["carta-astral","carta-astral-gratis.es","sc-domain:carta-astral-gratis.es"],["compatibilidad-signos","compatibilidad-signos.es","sc-domain:compatibilidad-signos.es"],["tarot-del-dia","tarot-del-dia.es","sc-domain:tarot-del-dia.es"],["calcular-numerologia","calcular-numerologia.es","sc-domain:calcular-numerologia.es"],["horoscopo-de-hoy","horoscopo-de-hoy.es","sc-domain:horoscopo-de-hoy.es"],["meditacion-chakras","meditacion-chakras.es","sc-domain:meditacion-chakras.es"]]
        run: |
          set -euo pipefail

          pip -q install google-auth

          adc_token=$(python3 -c "
          import google.auth
          import google.auth.transport.requests
          creds, _ = google.auth.default(scopes=['https://www.googleapis.com/auth/webmasters'])
          creds.refresh(google.auth.transport.requests.Request())
          print(creds.token)
          " 2>/dev/null || true)

          gsc_token="${OAUTH_TOKEN:-}"
          source_mode="oauth"
          if [ -z "$gsc_token" ] && [ "${GSC_ALLOW_SERVICE_ACCOUNT_URL_INSPECTION}" = "true" ] && [ -n "$adc_token" ]; then
            gsc_token="$adc_token"
            source_mode="service-account"
          elif [ -z "$gsc_token" ] && [ "${OAUTH_TOKEN_MISSING:-}" = "true" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            {
              echo "No se pudo ejecutar la vigilancia de indexación porque el OAuth de usuario de Search Console no es utilizable."
              echo ""
              echo "Detalle: ${OAUTH_ERROR_DETAIL:-No se pudo intercambiar GOOGLE_OAUTH_REFRESH_TOKEN por access token}."
              echo ""
              echo "La service account queda reservada para despliegue/verificación técnica; URL Inspection debe ejecutarse con una cuenta de usuario con acceso explícito a las propiedades de Search Console para evitar falsos 403 por dominio."
            } > /tmp/gsc-index-watch.md
            cat /tmp/gsc-index-watch.md
            exit 0
          fi

          if [ -z "$gsc_token" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "No se pudo obtener token para Search Console (OAuth ni service account)." > /tmp/gsc-index-watch.md
            exit 0
          fi

          echo "missing=false" >> "$GITHUB_OUTPUT"
          echo "token_source=$source_mode" >> "$GITHUB_OUTPUT"
          OAUTH_TOKEN="$gsc_token" python3 .github/scripts/gsc_index_watch.py > /tmp/gsc-index-watch.md
          if [ "$source_mode" = "service-account" ]; then
            {
              echo ""
              echo "> Nota: se usó fallback con service account por degradación de OAuth de usuario."
            } >> /tmp/gsc-index-watch.md
          fi
          cat /tmp/gsc-index-watch.md

      - name: "📝 Sincronizar issue de indexación"
        uses: actions/github-script@v8
        env:
          REPORT_PATH: /tmp/gsc-index-watch.md
          MISSING_GSC_TOKEN: ${{ steps.inspect.outputs.missing }}
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '🔎 Vigilancia de indexación de GSC';
            const legacyTitlePrefixes = [
              titlePrefix,
              '🔎 Vigilancia de indexación GSC'
            ];
            const today = new Date().toISOString().slice(0, 10);
            const body = process.env.MISSING_GSC_TOKEN === 'true'
              ? 'No se pudo ejecutar la vigilancia de indexación porque no hay token utilizable para Search Console (OAuth de usuario ni fallback service account).'
              : fs.readFileSync(process.env.REPORT_PATH, 'utf8');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'seo',
              per_page: 100
            });

            const matching = issues
              .filter(issue => legacyTitlePrefixes.some(prefix => issue.title.startsWith(prefix)))
              .sort((a, b) => a.number - b.number);
            const title = `${titlePrefix} — ${today}`;
            const hasIncidents = /403 Acceso denegado|SKIPPED por configuración|No se pudo ejecutar la vigilancia/i.test(body);

            if (!hasIncidents) {
              if (matching.length > 0) {
                const primary = matching[0];
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: primary.number,
                  title,
                  body,
                  state: 'closed'
                });

                for (const duplicate of matching.slice(1)) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    body: `Sustituido por #${primary.number}. Mantenemos un único issue canónico de vigilancia de indexación.`
                  });
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    state: 'closed'
                  });
                }
              }
              return;
            }

            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body,
                state: 'open'
              });

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Sustituido por #${primary.number}. Mantenemos un único issue canónico de vigilancia de indexación.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed'
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['seo']
              });
            }
