name: "🔍 Inspección manual de URLs en GSC"

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Sitio a inspeccionar"
        required: true
        type: choice
        options:
          - calcular-numerologia
          - carta-astral
          - compatibilidad-signos
          - tarot-del-dia
          - horoscopo-de-hoy
          - meditacion-chakras
      paths:
        description: "Rutas separadas por espacios"
        required: false
        default: "/"

permissions:
  contents: read

concurrency:
  group: gsc-url-inspection-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: "🔑 Autenticación de Google"
        id: auth
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: "🔎 Inspeccionar URLs"
        shell: bash
        env:
          SITE: ${{ inputs.site }}
          PATHS: ${{ inputs.paths }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_OAUTH_ADC_JSON: ${{ secrets.GOOGLE_OAUTH_ADC_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
          SA_AUTH_OUTCOME: ${{ steps.auth.outcome }}
        run: |
          set -euo pipefail
          case "$SITE" in
            calcular-numerologia) domain="calcular-numerologia.es" ;;
            carta-astral) domain="carta-astral-gratis.es" ;;
            compatibilidad-signos) domain="compatibilidad-signos.es" ;;
            tarot-del-dia) domain="tarot-del-dia.es" ;;
            horoscopo-de-hoy) domain="horoscopo-de-hoy.es" ;;
            meditacion-chakras) domain="meditacion-chakras.es" ;;
            *) echo "Unknown site: $SITE" >&2; exit 1 ;;
          esac

          access_token=""
          if [ -n "${GOOGLE_OAUTH_ADC_JSON:-}" ]; then
            pip -q install google-auth
            adc_file="$RUNNER_TEMP/google-oauth-adc.json"
            printf '%s' "$GOOGLE_OAUTH_ADC_JSON" > "$adc_file"
            chmod 600 "$adc_file"
            access_token=$(GOOGLE_APPLICATION_CREDENTIALS="$adc_file" python3 -c "import google.auth,google.auth.transport.requests;creds,_=google.auth.default(scopes=['https://www.googleapis.com/auth/webmasters']);creds.refresh(google.auth.transport.requests.Request());print(creds.token or '')" 2>/dev/null || true)
            rm -f "$adc_file"
          fi

          if [ -z "$access_token" ] && [ -n "${GOOGLE_OAUTH_CLIENT_ID:-}" ] && [ -n "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] && [ -n "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
              -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
              -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
              -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
              -d "grant_type=refresh_token" || true)
            access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          fi

          if [ -z "$access_token" ]; then
            pip -q install google-auth
            access_token=$(python3 -c "import google.auth,google.auth.transport.requests;creds,_=google.auth.default(scopes=['https://www.googleapis.com/auth/webmasters']);creds.refresh(google.auth.transport.requests.Request());print(creds.token)" 2>/dev/null || true)
          fi

          if [ -z "$access_token" ]; then
            echo "No usable token for GSC URL inspection." >&2
            echo "OAuth available: $( [ -n "${GOOGLE_OAUTH_CLIENT_ID:-}" ] && [ -n "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] && [ -n "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ] && echo yes || echo no )" >&2
            echo "Service account auth outcome: ${SA_AUTH_OUTCOME:-unknown}" >&2
            echo "Set GOOGLE_OAUTH_CLIENT_ID/SECRET/REFRESH_TOKEN or FIREBASE_SERVICE_ACCOUNT." >&2
            exit 1
          fi

          headers=(-H "Authorization: Bearer $access_token" -H "Content-Type: application/json")
          if [ -n "${GOOGLE_CLOUD_QUOTA_PROJECT:-}" ]; then
            headers+=(-H "X-Goog-User-Project: ${GOOGLE_CLOUD_QUOTA_PROJECT}")
          fi

          for path in $PATHS; do
            url="https://${domain}${path}"
            echo "## $url"
            inspected="false"
            for site_url in "sc-domain:${domain}" "https://${domain}/"; do
              body=$(jq -n --arg url "$url" --arg site "$site_url" '{inspectionUrl:$url, siteUrl:$site}')
              response=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 \
                -X POST \
                "${headers[@]}" \
                -d "$body" \
                "https://searchconsole.googleapis.com/v1/urlInspection/index:inspect" || true)

              if [ -z "$response" ]; then
                echo "WARN: ${site_url} returned an empty response; trying next candidate." >&2
                continue
              fi

              error_status=$(echo "$response" | jq -r '.error.status // empty' 2>/dev/null || true)
              if [ -n "$error_status" ]; then
                echo "WARN: ${site_url} returned ${error_status}; trying next candidate." >&2
                continue
              fi

              echo "$response" | jq --arg site_url "$site_url" '{siteUrl:$site_url, coverageState:.inspectionResult.indexStatusResult.coverageState, indexingState:.inspectionResult.indexStatusResult.indexingState, robotsTxtState:.inspectionResult.indexStatusResult.robotsTxtState, pageFetchState:.inspectionResult.indexStatusResult.pageFetchState, googleCanonical:.inspectionResult.indexStatusResult.googleCanonical, userCanonical:.inspectionResult.indexStatusResult.userCanonical}'
              inspected="true"
              break
            done

            if [ "$inspected" != "true" ]; then
              echo "Could not inspect $url with any candidate property." >&2
              exit 1
            fi
          done
