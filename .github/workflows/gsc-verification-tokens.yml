name: "🔐 Tokens de verificación de GSC"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Accion a ejecutar"
        required: true
        default: "list_dns_tokens"
        type: choice
        options:
          - list_dns_tokens
          - verify_url_prefix
      domain:
        description: "Dominio sin https:// (solo verify_url_prefix)"
        required: false
        default: "meditacion-chakras.es"
      site_key:
        description: "Clave del sitio (solo verify_url_prefix)"
        required: false
        default: "meditacion-chakras"
      firebase_project:
        description: "Proyecto Firebase (solo verify_url_prefix)"
        required: false
        default: "meditacion-chakras-es"

permissions:
  contents: write

concurrency:
  group: gsc-verification-tokens-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tokens:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.action == 'verify_url_prefix' }}

      - name: "🧪 Validar precondiciones"
        env:
          ACTION: ${{ inputs.action }}
          SITE_KEY: ${{ inputs.site_key }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SA_CARTA_ASTRAL: ${{ secrets.FIREBASE_SA_CARTA_ASTRAL }}
          FIREBASE_SA_COMPATIBILIDAD_SIGNOS: ${{ secrets.FIREBASE_SA_COMPATIBILIDAD_SIGNOS }}
          FIREBASE_SA_TAROT_DEL_DIA: ${{ secrets.FIREBASE_SA_TAROT_DEL_DIA }}
          FIREBASE_SA_CALCULAR_NUMEROLOGIA: ${{ secrets.FIREBASE_SA_CALCULAR_NUMEROLOGIA }}
          FIREBASE_SA_HOROSCOPO_DE_HOY: ${{ secrets.FIREBASE_SA_HOROSCOPO_DE_HOY }}
          FIREBASE_SA_MEDITACION_CHAKRAS: ${{ secrets.FIREBASE_SA_MEDITACION_CHAKRAS }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_OAUTH_CLIENT_ID:-}" ] || [ -z "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] || [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            echo "Missing OAuth secrets for Site Verification/GSC API." >&2
            echo "Required: GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET, GOOGLE_OAUTH_REFRESH_TOKEN." >&2
            exit 1
          fi

          if [ "${ACTION}" = "verify_url_prefix" ]; then
            firebase_service_account="${FIREBASE_SERVICE_ACCOUNT:-}"
            case "${SITE_KEY}" in
              carta-astral) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_CARTA_ASTRAL:-}}" ;;
              compatibilidad-signos) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_COMPATIBILIDAD_SIGNOS:-}}" ;;
              tarot-del-dia) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_TAROT_DEL_DIA:-}}" ;;
              calcular-numerologia) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_CALCULAR_NUMEROLOGIA:-}}" ;;
              horoscopo-de-hoy) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_HOROSCOPO_DE_HOY:-}}" ;;
              meditacion-chakras) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_MEDITACION_CHAKRAS:-}}" ;;
              *) echo "Unknown site_key for URL prefix verification: ${SITE_KEY}" >&2; exit 1 ;;
            esac

            if [ -z "${firebase_service_account:-}" ]; then
              echo "Missing Firebase service account secret for site_key=${SITE_KEY}." >&2
              exit 1
            fi
          fi

      - name: "🔑 Intercambiar refresh token OAuth"
        id: auth
        env:
          ACTION: ${{ inputs.action }}
          SITE_KEY: ${{ inputs.site_key }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SA_CARTA_ASTRAL: ${{ secrets.FIREBASE_SA_CARTA_ASTRAL }}
          FIREBASE_SA_COMPATIBILIDAD_SIGNOS: ${{ secrets.FIREBASE_SA_COMPATIBILIDAD_SIGNOS }}
          FIREBASE_SA_TAROT_DEL_DIA: ${{ secrets.FIREBASE_SA_TAROT_DEL_DIA }}
          FIREBASE_SA_CALCULAR_NUMEROLOGIA: ${{ secrets.FIREBASE_SA_CALCULAR_NUMEROLOGIA }}
          FIREBASE_SA_HOROSCOPO_DE_HOY: ${{ secrets.FIREBASE_SA_HOROSCOPO_DE_HOY }}
          FIREBASE_SA_MEDITACION_CHAKRAS: ${{ secrets.FIREBASE_SA_MEDITACION_CHAKRAS }}
        run: |
          set -euo pipefail

          token_json=$(curl -sS --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token" || true)

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "OAuth refresh token exchange did not return an access token; trying site service account fallback." >&2
            echo "$token_json" | jq -c '{error: (.error // ""), error_description: (.error_description // "")}' >&2 || true
          fi

          if [ -z "$access_token" ] && [ "${ACTION}" = "verify_url_prefix" ]; then
            firebase_service_account="${FIREBASE_SERVICE_ACCOUNT:-}"
            case "${SITE_KEY}" in
              carta-astral) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_CARTA_ASTRAL:-}}" ;;
              compatibilidad-signos) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_COMPATIBILIDAD_SIGNOS:-}}" ;;
              tarot-del-dia) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_TAROT_DEL_DIA:-}}" ;;
              calcular-numerologia) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_CALCULAR_NUMEROLOGIA:-}}" ;;
              horoscopo-de-hoy) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_HOROSCOPO_DE_HOY:-}}" ;;
              meditacion-chakras) firebase_service_account="${firebase_service_account:-${FIREBASE_SA_MEDITACION_CHAKRAS:-}}" ;;
              *) echo "Unknown site_key for URL prefix verification: ${SITE_KEY}" >&2; exit 1 ;;
            esac

            creds_file="$RUNNER_TEMP/site-verification-${SITE_KEY}.json"
            printf '%s' "$firebase_service_account" > "$creds_file"
            chmod 600 "$creds_file"
            python3 -m pip -q install google-auth
            access_token=$(GOOGLE_APPLICATION_CREDENTIALS="$creds_file" python3 -c "import google.auth, google.auth.transport.requests; scopes=['https://www.googleapis.com/auth/siteverification','https://www.googleapis.com/auth/webmasters']; creds,_=google.auth.default(scopes=scopes); creds.refresh(google.auth.transport.requests.Request()); print(creds.token or '')")
            rm -f "$creds_file"
          fi

          if [ -z "$access_token" ]; then
            echo "Could not mint OAuth access token" >&2
            exit 1
          fi

          echo "::add-mask::$access_token"
          token_path="$RUNNER_TEMP/google_oauth_access_token"
          printf '%s' "$access_token" > "$token_path"
          chmod 600 "$token_path"
          echo "access_token_path=$token_path" >> "$GITHUB_OUTPUT"

      - name: "🔎 Listar propiedades de GSC"
        if: ${{ inputs.action == 'list_dns_tokens' }}
        env:
          ACCESS_TOKEN_PATH: ${{ steps.auth.outputs.access_token_path }}
          QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
        run: |
          set -euo pipefail
          access_token=$(cat "$ACCESS_TOKEN_PATH")
          curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $access_token" \
            -H "x-goog-user-project: $QUOTA_PROJECT" \
            "https://searchconsole.googleapis.com/webmasters/v3/sites" | jq

      - name: "🧾 Generar tokens DNS TXT"
        if: ${{ inputs.action == 'list_dns_tokens' }}
        env:
          ACCESS_TOKEN_PATH: ${{ steps.auth.outputs.access_token_path }}
          QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
        run: |
          set -euo pipefail
          access_token=$(cat "$ACCESS_TOKEN_PATH")

          domains=(
            carta-astral-gratis.es
            compatibilidad-signos.es
            tarot-del-dia.es
            calcular-numerologia.es
            horoscopo-de-hoy.es
            meditacion-chakras.es
          )

          for domain in "${domains[@]}"; do
            echo "== $domain =="
            response=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -X POST \
              -H "Authorization: Bearer $access_token" \
              -H "x-goog-user-project: $QUOTA_PROJECT" \
              -H "Content-Type: application/json" \
              "https://www.googleapis.com/siteVerification/v1/token" \
              -d "{\"site\":{\"type\":\"INET_DOMAIN\",\"identifier\":\"$domain\"},\"verificationMethod\":\"DNS_TXT\"}")

            echo "$response" | jq -c '{token: (.token // ""), error: (.error.message // ""), status: (.error.status // "")}'
          done

      - name: "✅ Verificar URL prefix por meta tag"
        if: ${{ inputs.action == 'verify_url_prefix' }}
        env:
          ACCESS_TOKEN_PATH: ${{ steps.auth.outputs.access_token_path }}
          DOMAIN: ${{ inputs.domain }}
          SITE_KEY: ${{ inputs.site_key }}
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SA_CARTA_ASTRAL: ${{ secrets.FIREBASE_SA_CARTA_ASTRAL }}
          FIREBASE_SA_COMPATIBILIDAD_SIGNOS: ${{ secrets.FIREBASE_SA_COMPATIBILIDAD_SIGNOS }}
          FIREBASE_SA_TAROT_DEL_DIA: ${{ secrets.FIREBASE_SA_TAROT_DEL_DIA }}
          FIREBASE_SA_CALCULAR_NUMEROLOGIA: ${{ secrets.FIREBASE_SA_CALCULAR_NUMEROLOGIA }}
          FIREBASE_SA_HOROSCOPO_DE_HOY: ${{ secrets.FIREBASE_SA_HOROSCOPO_DE_HOY }}
          FIREBASE_SA_MEDITACION_CHAKRAS: ${{ secrets.FIREBASE_SA_MEDITACION_CHAKRAS }}
        run: |
          set -euo pipefail
          access_token=$(cat "$ACCESS_TOKEN_PATH")

          firebase_service_account=""
          case "$SITE_KEY" in
            carta-astral)
              DOMAIN="carta-astral-gratis.es"
              FIREBASE_PROJECT_ID="carta-astral-f4ab9"
              firebase_service_account="${FIREBASE_SA_CARTA_ASTRAL:-${FIREBASE_SERVICE_ACCOUNT:-}}"
              ;;
            compatibilidad-signos)
              DOMAIN="compatibilidad-signos.es"
              FIREBASE_PROJECT_ID="compat-signos-es"
              firebase_service_account="${FIREBASE_SA_COMPATIBILIDAD_SIGNOS:-${FIREBASE_SERVICE_ACCOUNT:-}}"
              ;;
            tarot-del-dia)
              DOMAIN="tarot-del-dia.es"
              FIREBASE_PROJECT_ID="tarot-del-dia-es"
              firebase_service_account="${FIREBASE_SA_TAROT_DEL_DIA:-${FIREBASE_SERVICE_ACCOUNT:-}}"
              ;;
            calcular-numerologia)
              DOMAIN="calcular-numerologia.es"
              FIREBASE_PROJECT_ID="calc-numerologia-es"
              firebase_service_account="${FIREBASE_SA_CALCULAR_NUMEROLOGIA:-${FIREBASE_SERVICE_ACCOUNT:-}}"
              ;;
            horoscopo-de-hoy)
              DOMAIN="horoscopo-de-hoy.es"
              FIREBASE_PROJECT_ID="horoscopo-hoy-es"
              firebase_service_account="${FIREBASE_SA_HOROSCOPO_DE_HOY:-${FIREBASE_SERVICE_ACCOUNT:-}}"
              ;;
            meditacion-chakras)
              DOMAIN="meditacion-chakras.es"
              FIREBASE_PROJECT_ID="meditacion-chakras-es"
              firebase_service_account="${FIREBASE_SA_MEDITACION_CHAKRAS:-${FIREBASE_SERVICE_ACCOUNT:-}}"
              ;;
            *) echo "Unknown site_key for URL prefix verification: $SITE_KEY" >&2; exit 1 ;;
          esac

          if [ -z "${firebase_service_account:-}" ]; then
            echo "Missing Firebase service account secret for site_key=${SITE_KEY}." >&2
            exit 1
          fi

          site_url="https://${DOMAIN}/"

          # 1) Pedir token de verificacion por META tag
          token_response=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/json" \
            "https://www.googleapis.com/siteVerification/v1/token" \
            -d "{\"site\":{\"type\":\"SITE\",\"identifier\":\"$site_url\"},\"verificationMethod\":\"META\"}")

          verify_token=$(echo "$token_response" | jq -r '.token // empty')
          if [ -z "$verify_token" ]; then
            echo "$token_response" | jq .
            echo "No se pudo obtener token META de Site Verification" >&2
            exit 1
          fi

          # 2) Insertar meta tag en index.html y desplegar a Firebase Hosting
          index_file="sites/${SITE_KEY}/public/index.html"
          if echo "$verify_token" | grep -q '^<meta '; then
            # Para META, la API suele devolver el tag completo.
            verify_meta="$verify_token"
            verify_token_value=$(printf '%s' "$verify_token" | sed -n 's/.*content="\([^"]*\)".*/\1/p')
          else
            # Fallback defensivo por si devolviera solo el valor del token.
            verify_meta="<meta name=\"google-site-verification\" content=\"${verify_token}\" />"
            verify_token_value="$verify_token"
          fi
          if [ -z "$verify_token_value" ]; then
            echo "No se pudo extraer el valor content del token META." >&2
            exit 1
          fi
          echo "::add-mask::$verify_token_value"

          site_dir="sites/${SITE_KEY}"
          generated=0
          for script_path in "$site_dir/scripts/gen-pages.sh" "$site_dir/scripts/gen-sign-pages.sh"; do
            if [ -f "$script_path" ]; then
              echo "Generating $SITE_KEY with $script_path"
              bash "$script_path"
              generated=1
            fi
          done
          if [ "$generated" -eq 0 ]; then
            echo "No generator script for $SITE_KEY"
          fi

          source shared/config.sh
          adsense_apply_head_snippet_to_file "$index_file"

          if [ ! -f "$index_file" ]; then
            echo "Expected $index_file to exist before verification deploy" >&2
            exit 1
          fi

          if ! grep -Fq "$verify_meta" "$index_file"; then
            awk -v meta="$verify_meta" '
              BEGIN { inserted=0 }
              {
                if (!inserted && $0 ~ /<\/head>/) {
                  print "  " meta
                  inserted=1
                }
                print
              }
              END {
                if (!inserted) {
                  print meta
                }
              }
            ' "$index_file" > "$index_file.tmp"
            mv "$index_file.tmp" "$index_file"
          fi

          creds_file="$RUNNER_TEMP/firebase-${SITE_KEY}.json"
          cleanup() {
            rm -f "$creds_file"
          }
          trap cleanup EXIT
          printf '%s' "$firebase_service_account" > "$creds_file"
          chmod 600 "$creds_file"
          GOOGLE_APPLICATION_CREDENTIALS="$creds_file" \
            npx firebase-tools@15.15.0 deploy \
              --config "sites/${SITE_KEY}/firebase.json" \
              --only hosting \
              --project "$FIREBASE_PROJECT_ID" \
              --non-interactive

          # Esperar a que el token META sea visible en el dominio final
          token_visible="false"
          for attempt in {1..12}; do
            page=$(curl -sS --connect-timeout 10 --max-time 30 \
              -H "Cache-Control: no-cache" \
              "https://${DOMAIN}/?gsc_verify_attempt=${attempt}" || true)
            if grep -Fq "$verify_token_value" <<< "$page"; then
              token_visible="true"
              echo "Token META visible en ${DOMAIN} (intento ${attempt})."
              break
            fi
            echo "Token META aun no visible en ${DOMAIN} (intento ${attempt}/12)."
            sleep 10
          done

          if [ "$token_visible" != "true" ]; then
            echo "El token META no es visible en https://${DOMAIN}/ tras esperar propagacion." >&2
            exit 1
          fi

          # 3) Completar verificacion del sitio con metodo META
          verify_response=$(curl -sS --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/json" \
            "https://www.googleapis.com/siteVerification/v1/webResource?verificationMethod=META" \
            -d "{\"site\":{\"type\":\"SITE\",\"identifier\":\"$site_url\"}}")

          owner=$(echo "$verify_response" | jq -r '.owners[0] // empty')
          if [ -z "$owner" ]; then
            echo "$verify_response" | jq .
            echo "Site verification no devolvio owners" >&2
            exit 1
          fi
          echo "Sitio verificado para owner: $owner"

          site_url_enc=$(python3 -c "import urllib.parse;print(urllib.parse.quote('${site_url}',''))")
          add_site_code=$(curl -sS --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -o /tmp/gsc-add-site-response.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $access_token" \
            "https://searchconsole.googleapis.com/webmasters/v3/sites/${site_url_enc}")
          if [ "$add_site_code" != "200" ] && [ "$add_site_code" != "204" ]; then
            cat /tmp/gsc-add-site-response.json || true
            echo "No se pudo registrar ${site_url} como propiedad de Search Console (HTTP ${add_site_code})." >&2
            exit 1
          fi
          echo "Propiedad Search Console registrada: ${site_url}"

          echo "Verificacion completada. El token META se ha desplegado, pero no se guarda en Git."
