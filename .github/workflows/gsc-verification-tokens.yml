name: "🔐 Tokens de verificación de GSC"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Accion a ejecutar"
        required: true
        default: "list_dns_tokens"
        type: choice
        options:
          - list_dns_tokens
          - verify_url_prefix
      domain:
        description: "Dominio sin https:// (solo verify_url_prefix)"
        required: false
        default: "meditacion-chakras.es"
      site_key:
        description: "Clave del sitio (solo verify_url_prefix)"
        required: false
        default: "meditacion-chakras"
      firebase_project:
        description: "Proyecto Firebase (solo verify_url_prefix)"
        required: false
        default: "meditacion-chakras-es"

permissions:
  contents: write

jobs:
  tokens:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "🔑 Intercambiar refresh token OAuth"
        id: auth
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token")

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "$token_json"
            echo "Could not mint OAuth access token" >&2
            exit 1
          fi

          {
            echo "access_token<<EOF"
            echo "$access_token"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "🔎 Listar propiedades de GSC"
        if: ${{ inputs.action == 'list_dns_tokens' }}
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
        run: |
          set -euo pipefail
          curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-user-project: $QUOTA_PROJECT" \
            "https://searchconsole.googleapis.com/webmasters/v3/sites" | jq

      - name: "🧾 Generar tokens DNS TXT"
        if: ${{ inputs.action == 'list_dns_tokens' }}
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          QUOTA_PROJECT: ${{ secrets.GOOGLE_CLOUD_QUOTA_PROJECT }}
        run: |
          set -euo pipefail

          domains=(
            compatibilidad-signos.es
            tarot-del-dia.es
            calcular-numerologia.es
            horoscopo-de-hoy.es
            meditacion-chakras.es
          )

          for domain in "${domains[@]}"; do
            echo "== $domain =="
            response=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "x-goog-user-project: $QUOTA_PROJECT" \
              -H "Content-Type: application/json" \
              "https://www.googleapis.com/siteVerification/v1/token" \
              -d "{\"site\":{\"type\":\"INET_DOMAIN\",\"identifier\":\"$domain\"},\"verificationMethod\":\"DNS_TXT\"}")

            echo "$response" | jq -c '{token: (.token // ""), error: (.error.message // ""), status: (.error.status // "")}'
          done

      - name: "✅ Verificar URL prefix por meta tag"
        if: ${{ inputs.action == 'verify_url_prefix' }}
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          DOMAIN: ${{ inputs.domain }}
          SITE_KEY: ${{ inputs.site_key }}
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SA_MEDITACION_CHAKRAS }}
        run: |
          set -euo pipefail

          if [ "$SITE_KEY" != "meditacion-chakras" ]; then
            echo "Por ahora solo se admite site_key=meditacion-chakras para deploy automatizado." >&2
            exit 1
          fi

          site_url="https://${DOMAIN}/"

          # 1) Pedir token de verificacion por META tag
          token_response=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://www.googleapis.com/siteVerification/v1/token" \
            -d "{\"site\":{\"type\":\"SITE\",\"identifier\":\"$site_url\"},\"verificationMethod\":\"META\"}")

          verify_token=$(echo "$token_response" | jq -r '.token // empty')
          if [ -z "$verify_token" ]; then
            echo "$token_response" | jq .
            echo "No se pudo obtener token META de Site Verification" >&2
            exit 1
          fi

          # 2) Insertar meta tag en index.html y desplegar a Firebase Hosting
          index_file="sites/${SITE_KEY}/public/index.html"
          verify_meta="<meta name=\"google-site-verification\" content=\"${verify_token}\" />"

          if ! grep -Fq "$verify_meta" "$index_file"; then
            awk -v meta="$verify_meta" '
              BEGIN { inserted=0 }
              {
                if (!inserted && $0 ~ /<\/head>/) {
                  print "  " meta
                  inserted=1
                }
                print
              }
              END {
                if (!inserted) {
                  print meta
                }
              }
            ' "$index_file" > "$index_file.tmp"
            mv "$index_file.tmp" "$index_file"
          fi

          creds_file="$RUNNER_TEMP/firebase-${SITE_KEY}.json"
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$creds_file"
          GOOGLE_APPLICATION_CREDENTIALS="$creds_file" \
            npx firebase-tools@15.15.0 deploy \
              --config "sites/${SITE_KEY}/firebase.json" \
              --only hosting \
              --project "$FIREBASE_PROJECT_ID" \
              --non-interactive
          rm -f "$creds_file"

          # 3) Completar verificacion del sitio con metodo META
          verify_response=$(curl -sS --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://www.googleapis.com/siteVerification/v1/webResource?verificationMethod=META" \
            -d "{\"site\":{\"type\":\"SITE\",\"identifier\":\"$site_url\"}}")

          owner=$(echo "$verify_response" | jq -r '.owners[0] // empty')
          if [ -z "$owner" ]; then
            echo "$verify_response" | jq .
            echo "Site verification no devolvio owners" >&2
            exit 1
          fi
          echo "Sitio verificado para owner: $owner"

          # 4) Guardar permanentemente el meta tag en el repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$index_file"
          if ! git diff --cached --quiet; then
            git commit -m "chore: agregar meta de verificacion GSC para ${DOMAIN}"
            git push origin HEAD
          fi
