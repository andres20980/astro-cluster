name: "🧹 Limpieza temporal GA4 obsoleta"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Escribe DELETE_OBSOLETE_GA4 para ejecutar"
        required: true
        type: string

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Validar confirmación"
        run: |
          set -euo pipefail
          test "${{ inputs.confirm }}" = "DELETE_OBSOLETE_GA4"

      - name: "Obtener OAuth token GA4 Admin"
        id: oauth
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token")
          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "$token_json" | jq .
            exit 1
          fi
          echo "::add-mask::$access_token"
          echo "token=$access_token" >> "$GITHUB_OUTPUT"

      - name: "Borrar propiedades y stream obsoletos"
        env:
          TOKEN: ${{ steps.oauth.outputs.token }}
        run: |
          set -euo pipefail
          api="https://analyticsadmin.googleapis.com/v1beta"

          echo "Propiedades visibles antes:"
          curl -sS -H "Authorization: Bearer $TOKEN" "$api/accountSummaries?pageSize=200" \
            | jq -r '.accountSummaries[]? as $a | $a.propertySummaries[]? | "\(.property)\t\(.displayName)"'

          obsolete_properties=(
            "properties/532285685" # calc-numerologia-es
            "properties/532293400" # compat-signos-es
            "properties/532300461" # horoscopo-hoy-es
            "properties/211806081" # python20980
            "properties/532270880" # tarot-del-dia-es
          )

          for property in "${obsolete_properties[@]}"; do
            echo "Deleting $property"
            response="$(curl -sS -X DELETE -H "Authorization: Bearer $TOKEN" "$api/$property" || true)"
            echo "$response" | jq .
            if echo "$response" | jq -e '.error' >/dev/null; then
              echo "Delete failed for $property" >&2
              exit 1
            fi
          done

          echo "Deleting obsolete stream properties/531527723/dataStreams/14325822407"
          response="$(curl -sS -X DELETE -H "Authorization: Bearer $TOKEN" "$api/properties/531527723/dataStreams/14325822407" || true)"
          echo "$response" | jq .
          if echo "$response" | jq -e '.error' >/dev/null; then
            echo "Stream delete failed" >&2
            exit 1
          fi

          echo "Propiedades visibles después:"
          curl -sS -H "Authorization: Bearer $TOKEN" "$api/accountSummaries?pageSize=200" \
            | jq -r '.accountSummaries[]? as $a | $a.propertySummaries[]? | "\(.property)\t\(.displayName)"'

          echo "Streams restantes en astro-cluster:"
          curl -sS -H "Authorization: Bearer $TOKEN" "$api/properties/531527723/dataStreams?pageSize=50" \
            | jq -r '.dataStreams[]? | "\(.name)\t\(.displayName)\t\(.webStreamData.measurementId // "-")"'
