name: "🔒 Bootstrap: Reactivate branch protection"

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 0 * * *"  # Daily at 00:00 UTC (fallback if manual trigger fails)

permissions:
  contents: read

jobs:
  protect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔒 Reactivar branch protection con checks SEO"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat <<'JSON' >/tmp/protection.json
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "seo-required-gate",
                "seo-config-guard",
                "seo-rules-guard",
                "seo-python-sanity"
              ]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": null,
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_linear_history": false,
            "block_creations": false,
            "required_conversation_resolution": false,
            "lock_branch": false,
            "allow_fork_syncing": true
          }
          JSON
          
          GH_PAGER=cat gh api -X PUT repos/andres20980/astro-cluster/branches/master/protection --input /tmp/protection.json
          echo "✅ Branch protection reactivated"
