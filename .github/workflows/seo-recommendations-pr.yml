name: "🧠 PR semanal de recomendaciones SEO"

on:
  schedule:
    - cron: '15 8 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-recommendations-pr
  cancel-in-progress: true

jobs:
  propose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: "🧠 Generar recomendaciones por sitio"
        run: |
          set -euo pipefail
          python3 .github/scripts/seo_recommendation_seed.py --max-items 3

      - name: "🧾 Abrir PR de recomendaciones"
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: seo/recommendations-${{ github.run_id }}
          base: master
          delete-branch: true
          title: "chore(seo): actualizar recomendaciones semanales"
          commit-message: "chore(seo): actualizar recomendaciones semanales"
          labels: seo,automated,automerge
          body: |
            PR automático con actualización de `SEO_AGENT_RECOMMENDATIONS.json` en los sitios del cluster.

            Objetivo:
            - Convertir señales GSC + reglas de autopatch en recomendaciones concretas.
            - Mantener trazabilidad de decisiones sugeridas antes de aplicar cambios.
