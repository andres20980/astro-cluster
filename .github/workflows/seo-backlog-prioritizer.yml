name: "🗂️ Backlog SEO priorizado"

on:
  schedule:
    - cron: '55 9 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: seo-backlog-prioritizer
  cancel-in-progress: true

jobs:
  backlog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "🧮 Generar señales base"
        run: |
          set -euo pipefail
          python3 .github/scripts/seo_cluster_scorecard.py --json /tmp/seo-scorecard.json --report /tmp/seo-scorecard.md
          python3 .github/scripts/check_query_cannibalization.py --json /tmp/seo-cannibalization.json --report /tmp/seo-cannibalization.md --fail-threshold 999
          python3 .github/scripts/seo_engine_precision.py --json /tmp/seo-engine-precision.json --report /tmp/seo-engine-precision.md
          python3 .github/scripts/seo_interlink_recommendations.py --json /tmp/seo-interlink.json --report /tmp/seo-interlink.md

      - name: "🗂️ Priorizar backlog"
        run: |
          set -euo pipefail
          python3 .github/scripts/seo_backlog_prioritizer.py --json /tmp/seo-backlog.json --report /tmp/seo-backlog.md
          cat /tmp/seo-backlog.md

      - name: "📝 Sincronizar issue canónico"
        uses: actions/github-script@v8
        env:
          REPORT_PATH: /tmp/seo-backlog.md
          JSON_PATH: /tmp/seo-backlog.json
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '🗂️ Backlog SEO priorizado';
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              fs.readFileSync(process.env.REPORT_PATH, 'utf8'),
              '',
              '```json',
              fs.readFileSync(process.env.JSON_PATH, 'utf8'),
              '```',
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seo,automated',
              per_page: 100,
            });

            const matching = issues
              .filter((issue) => issue.title.startsWith(titlePrefix))
              .sort((a, b) => a.number - b.number);
            const title = `${titlePrefix} — ${today}`;

            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body,
              });
              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed',
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['seo', 'automated'],
              });
            }
