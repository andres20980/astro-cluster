name: "⚙️ Sincronización de GA4 Admin"

on:
  schedule:
    - cron: '20 7 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔑 Autenticar service account de Google"
        id: saauth
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: "🔐 Obtener token GA4 Admin"
        id: ga4_admin
        if: steps.saauth.outcome == 'success'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.saauth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail
          pip -q install google-auth
          access_token=$(python3 -c "
          import google.auth
          import google.auth.transport.requests
          creds, _ = google.auth.default(scopes=[
              'https://www.googleapis.com/auth/analytics.edit',
              'https://www.googleapis.com/auth/cloud-platform',
          ])
          creds.refresh(google.auth.transport.requests.Request())
          print(creds.token or '')
          ")

          if [ -z "$access_token" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::add-mask::$access_token"
          token_path="$RUNNER_TEMP/ga4_admin_token"
          printf '%s' "$access_token" > "$token_path"
          chmod 600 "$token_path"
          echo "missing=false" >> "$GITHUB_OUTPUT"
          echo "token_path=$token_path" >> "$GITHUB_OUTPUT"

      - name: "🔐 Obtener token OAuth GA4 Admin"
        id: oauth_ga4_admin
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_OAUTH_CLIENT_ID:-}" ] || [ -z "${GOOGLE_OAUTH_CLIENT_SECRET:-}" ] || [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN:-}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          token_json=$(curl -sS --fail-with-body --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 30 https://oauth2.googleapis.com/token \
            -d "client_id=$GOOGLE_OAUTH_CLIENT_ID" \
            -d "client_secret=$GOOGLE_OAUTH_CLIENT_SECRET" \
            -d "refresh_token=$GOOGLE_OAUTH_REFRESH_TOKEN" \
            -d "grant_type=refresh_token" || true)

          access_token=$(echo "$token_json" | jq -r '.access_token // empty')
          if [ -z "$access_token" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::add-mask::$access_token"
          token_path="$RUNNER_TEMP/ga4_oauth_admin_token"
          printf '%s' "$access_token" > "$token_path"
          chmod 600 "$token_path"
          echo "missing=false" >> "$GITHUB_OUTPUT"
          echo "token_path=$token_path" >> "$GITHUB_OUTPUT"

      - name: "🧭 Seleccionar token GA4 Admin"
        id: ga4_token
        if: always()
        env:
          OAUTH_TOKEN_PATH: ${{ steps.oauth_ga4_admin.outputs.token_path }}
          SA_TOKEN_PATH: ${{ steps.ga4_admin.outputs.token_path }}
        run: |
          set -euo pipefail

          if [ -n "${OAUTH_TOKEN_PATH:-}" ] && [ -f "${OAUTH_TOKEN_PATH}" ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "token_path=${OAUTH_TOKEN_PATH}" >> "$GITHUB_OUTPUT"
            echo "source=oauth" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${SA_TOKEN_PATH:-}" ] && [ -f "${SA_TOKEN_PATH}" ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "token_path=${SA_TOKEN_PATH}" >> "$GITHUB_OUTPUT"
            echo "source=service-account" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "missing=true" >> "$GITHUB_OUTPUT"
          echo "source=none" >> "$GITHUB_OUTPUT"

      - name: "🏷️ Sincronizar nombres de propiedad y stream"
        if: steps.ga4_token.outputs.missing != 'true'
        env:
          GA4_TOKEN_PATH: ${{ steps.ga4_token.outputs.token_path }}
        run: |
          set -euo pipefail
          python3 .github/scripts/ga4_property_stream_names.py \
            --property properties/531527723 \
            --property-display-name astro-cluster \
            --stream properties/531527723/dataStreams/14325968472 \
            --stream-display-name "astro-cluster web" \
            --token "$(cat "$GA4_TOKEN_PATH")" \
            --apply

      - name: "⚙️ Sincronizar dimensiones personalizadas"
        if: steps.ga4_token.outputs.missing != 'true'
        env:
          GA4_TOKEN_PATH: ${{ steps.ga4_token.outputs.token_path }}
        run: |
          set -euo pipefail
          python3 .github/scripts/ga4_custom_definitions.py \
            --property properties/531527723 \
            --token "$(cat "$GA4_TOKEN_PATH")" \
            --manifest shared/ga4_custom_dimensions.json \
            --apply

      - name: "🎯 Sincronizar eventos clave"
        if: steps.ga4_token.outputs.missing != 'true'
        env:
          GA4_TOKEN_PATH: ${{ steps.ga4_token.outputs.token_path }}
        run: |
          set -euo pipefail
          python3 .github/scripts/ga4_key_events.py \
            --property properties/531527723 \
            --token "$(cat "$GA4_TOKEN_PATH")" \
            --manifest shared/ga4_key_events.json \
            --apply

      - name: "🧾 Resumen"
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.ga4_token.outputs.missing }}" = "true" ]; then
            echo "No se pudo sincronizar GA4 Admin porque no hay token usable (OAuth ni service account)." >> /tmp/ga4-admin-sync.md
          else
            echo "Sincronización GA4 Admin ejecutada." >> /tmp/ga4-admin-sync.md
            echo "Fuente de token: ${{ steps.ga4_token.outputs.source }}" >> /tmp/ga4-admin-sync.md
            python3 .github/scripts/ga4_admin_watch.py \
              --property properties/531527723 \
              --token "$(cat "${{ steps.ga4_token.outputs.token_path }}")" \
              --dimensions-manifest shared/ga4_custom_dimensions.json \
              --key-events-manifest shared/ga4_key_events.json >> /tmp/ga4-admin-sync.md
          fi
          cat /tmp/ga4-admin-sync.md

      - name: "📝 Sincronizar issue canónico"
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const titlePrefix = '⚙️ Sincronización de GA4 Admin';
            const legacyTitlePrefixes = [
              titlePrefix,
              '⚙️ Sincronización GA4 Admin'
            ];
            const today = new Date().toISOString().slice(0, 10);
            const body = fs.readFileSync('/tmp/ga4-admin-sync.md', 'utf8');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'report',
              per_page: 100
            });
            const matching = issues
              .filter(issue => legacyTitlePrefixes.some(prefix => issue.title.startsWith(prefix)))
              .sort((a, b) => a.number - b.number);
            const title = `${titlePrefix} — ${today}`;
            if (matching.length > 0) {
              const primary = matching[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                title,
                body
              });

              for (const duplicate of matching.slice(1)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body: `Sustituido por #${primary.number}. Mantenemos un único issue canónico de sincronización GA4 Admin.`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  state: 'closed'
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['report']
              });
            }
