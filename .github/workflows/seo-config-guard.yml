name: "🧱 SEO config guard"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - ".github/config/seo-thresholds.json"
      - ".github/workflows/**"
      - ".github/scripts/**"

permissions:
  contents: read

jobs:
  validate-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: "🔍 Validar coherencia de umbrales"
        run: |
          set -euo pipefail
          python3 .github/scripts/check_seo_thresholds_consistency.py .github/config/seo-thresholds.json

      - name: "🔎 Validar formato JSON"
        run: |
          set -euo pipefail
          jq . .github/config/seo-thresholds.json >/dev/null

      - name: "🧪 Validar scripts dependientes"
        run: |
          set -euo pipefail
          python3 -m py_compile \
            .github/scripts/check_seo_thresholds_consistency.py \
            .github/scripts/seo_threshold_recommender.py \
            .github/scripts/apply_seo_threshold_recommendation.py
