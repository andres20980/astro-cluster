name: "📊 Operaciones SEO semanales (auto-validación)"

on:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  weekly-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100

      - name: "📈 Validar consistencia de configuración"
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/check_seo_thresholds_consistency.py .github/config/seo-thresholds.json
          python3 .github/scripts/validate_seo_rules_coverage.py .github/config/seo-autopatch-rules.json

      - name: "🧮 Calcular indicadores semanales"
        id: metrics
        shell: bash
        run: |
          set -euo pipefail
          since=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          merged_count=$(git log --grep="feat(seo): auto-optim" --grep="chore(seo):" --since="$since" --oneline | wc -l)
          rollback_count=$(git log --grep="revert(seo):" --since="$since" --oneline | wc -l)

          status="GREEN"
          if [ "$rollback_count" -gt 2 ]; then
            status="RED"
          elif [ "$rollback_count" -gt 0 ]; then
            status="YELLOW"
          fi

          {
            echo "merged=$merged_count"
            echo "rollbacks=$rollback_count"
            echo "status=$status"
          } >> "$GITHUB_OUTPUT"

      - name: "📝 Publicar issue de reporte"
        uses: actions/github-script@v8
        env:
          MERGED: ${{ steps.metrics.outputs.merged }}
          ROLLBACKS: ${{ steps.metrics.outputs.rollbacks }}
          STATUS: ${{ steps.metrics.outputs.status }}
        with:
          script: |
            const merged = Number(process.env.MERGED || '0');
            const rollbacks = Number(process.env.ROLLBACKS || '0');
            const status = process.env.STATUS || 'GREEN';
            const now = new Date().toISOString();

            const body = [
              `## Reporte operativo SEO - ${now}`,
              '',
              `**Estado general**: ${status}`,
              `- PRs automáticos mezclados (7 días): ${merged}`,
              `- Rollbacks detectados (7 días): ${rollbacks}`,
              '- Validación de config: OK',
            ].join('\n');

            if (rollbacks > 0 || merged === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📊 Reporte semanal SEO: revisión operativa recomendada',
                body,
                labels: ['seo', 'automated', 'ops-review']
              });
            }
