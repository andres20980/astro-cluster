name: "🕵️ Inteligencia competitiva"

on:
  schedule:
    - cron: '30 8 * * 2'

concurrency:
  group: seo-competitor-intel
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  intel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: "⚙️ Preparar Node"
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: "🧭 Seleccionar sitio"
        id: select
        shell: bash
        run: |
          set -euo pipefail
          sites=(carta-astral compatibilidad-signos tarot-del-dia calcular-numerologia horoscopo-de-hoy meditacion-chakras)

          idx=$(( (10#$(date -u +%j) - 1) % ${#sites[@]} ))
          site="${sites[$idx]}"

          echo "site=$site" >> "$GITHUB_OUTPUT"
          echo "Selected site: $site"

      - name: "🕵️ Analizar competidores"
        env:
          SITE_KEY: ${{ steps.select.outputs.site }}
        run: |
          set -euo pipefail
          node .github/scripts/seo-competitor-intel.js

      - name: "📤 Confirmar resultados"
        env:
          SITE_KEY: ${{ steps.select.outputs.site }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "sites/${SITE_KEY}/docs/SEO_COMPETITOR_INTEL.json"
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: update competitor intel ${SITE_KEY} $(date -u +%F)"
            git push
          fi
